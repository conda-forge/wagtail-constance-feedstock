{% set name = "wagtail-constance" %}
{% set version = "0.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/wagtail-constance-{{ version }}.tar.gz
  sha256: f11630c2a4f0cc6c3a5b0c4fe5d2bf7cd579fecaab3f7731615bb72653fe6e87

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - django-constance

test:
  imports:
    - wagtailconstance
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/MechanisM/wagtail-constance
  summary: django-constance integration for Wagtail CMS
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
